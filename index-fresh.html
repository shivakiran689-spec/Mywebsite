<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Stand-up · AI-Powered</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Geist+Mono:wght@400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --indigo:#4F46E5;--green:#059669;--green-soft:#10B981;
  --red:#DC2626;--red-soft:#EF4444;--purple:#7C3AED;
  --bg:#F0F4FF;--fg:#0F172A;--muted:#64748B;--dim:#94A3B8;
  --card:#fff;--cb:rgba(79,70,229,0.1);--cs:0 1px 3px rgba(0,0,0,0.05),0 4px 16px rgba(79,70,229,0.06);
  --fd:'Syne',sans-serif;--fb:'Lora',serif;--fm:'Geist Mono',monospace;
}
html,body{background:var(--bg);color:var(--fg);min-height:100vh;font-family:var(--fd)}
body{background-image:radial-gradient(ellipse 100% 60% at 80% -10%,rgba(79,70,229,0.08),transparent 60%),radial-gradient(ellipse 70% 50% at 0% 100%,rgba(124,58,237,0.06),transparent 60%)}
button{cursor:pointer;font-family:var(--fd);background:none;border:none;color:inherit}
input,textarea{font-family:var(--fd)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(79,70,229,0.2);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes blink{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.fi1{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .00s both}
.fi2{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .07s both}
.fi3{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .14s both}
.fi4{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .21s both}
.fi5{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .28s both}
.landing{min-height:100vh;display:grid;grid-template-columns:1fr 460px}
.l-left{padding:56px 64px;display:flex;flex-direction:column;justify-content:space-between}
.l-right{background:linear-gradient(160deg,rgba(79,70,229,.03),rgba(124,58,237,.05));border-left:1px solid rgba(79,70,229,.1);padding:56px 44px;display:flex;flex-direction:column;justify-content:center;gap:24px}
.topbar{padding:14px 40px;border-bottom:1px solid rgba(79,70,229,.1);background:rgba(255,255,255,.9);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.mw{max-width:1280px;margin:0 auto;padding:40px}
.card{background:var(--card);border:1px solid var(--cb);box-shadow:var(--cs);transition:all .25s}
.card-h:hover{border-color:rgba(79,70,229,.3);box-shadow:0 4px 20px rgba(79,70,229,.12);transform:translateY(-1px);cursor:pointer}
.ai-panel{border:1.5px solid rgba(124,58,237,.25);background:linear-gradient(145deg,rgba(255,255,255,.98),rgba(245,243,255,.5));box-shadow:0 4px 24px rgba(124,58,237,.12);position:relative;overflow:hidden}
.ai-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#7C3AED,#4F46E5,#7C3AED);background-size:200% 100%;animation:shimmer 3s linear infinite}
.btn-p{background:linear-gradient(135deg,#4F46E5,#3730A3);color:#fff;font-weight:600;font-size:13px;padding:10px 20px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(79,70,229,.3);transition:all .25s}
.btn-p:hover{box-shadow:0 8px 28px rgba(79,70,229,.45);transform:translateY(-1px)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-g{background:rgba(79,70,229,.05);border:1px solid rgba(79,70,229,.15);color:var(--fg);font-size:13px;font-weight:500;padding:10px 18px;display:inline-flex;align-items:center;gap:8px;transition:all .2s;cursor:pointer}
.btn-g:hover{background:rgba(79,70,229,.1);border-color:rgba(79,70,229,.3);color:#4F46E5}
.btn-ai{background:linear-gradient(135deg,#7C3AED,#4F46E5);color:#fff;font-size:10px;font-weight:600;padding:7px 14px;display:inline-flex;align-items:center;gap:6px;box-shadow:0 2px 12px rgba(124,58,237,.35);cursor:pointer;transition:all .25s;text-transform:uppercase;letter-spacing:.05em;border:none}
.btn-ai:hover{box-shadow:0 6px 24px rgba(124,58,237,.5);transform:translateY(-1px)}
.btn-ai:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.inp{background:#F8FAFF;border:1px solid rgba(79,70,229,.15);color:var(--fg);padding:10px 12px;font-size:13px;outline:none;transition:all .2s;width:100%}
.inp:focus{border-color:rgba(79,70,229,.5);box-shadow:0 0 0 3px rgba(79,70,229,.08)}
.inp::placeholder{color:var(--dim)}
.dz{border:1.5px dashed rgba(79,70,229,.2);background:rgba(79,70,229,.02);padding:18px 20px;cursor:pointer;transition:all .2s}
.dz:hover,.dz.ov{border-color:rgba(79,70,229,.5);background:rgba(79,70,229,.04)}
.mono{font-family:var(--fm);font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--dim)}
.ai-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--purple);background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);padding:3px 8px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--purple);animation:pulse 2s ease-in-out infinite;display:inline-block}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--purple);display:inline-block}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(79,70,229,.15),transparent)}
.sg{display:grid;grid-template-columns:8fr 4fr;gap:40px}
.chat-box{height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:rgba(79,70,229,.02);border:1px solid rgba(79,70,229,.08);padding:12px;margin-bottom:10px}
.cb-u{background:linear-gradient(135deg,#4F46E5,#3730A3);color:#fff;padding:8px 12px;font-size:12px;line-height:1.6;max-width:88%;align-self:flex-end}
.cb-a{background:#fff;border:1px solid rgba(124,58,237,.25);color:var(--fg);padding:8px 12px;font-size:12px;line-height:1.6;max-width:88%;align-self:flex-start;white-space:pre-wrap}
.pbadge{font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:.15em;padding:3px 8px;display:inline-flex;align-items:center}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(79,70,229,.08)}
.kpi{background:#fff;padding:28px 24px}
.admin-ov{position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.65);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center}
.admin-pn{position:fixed;top:0;right:0;bottom:0;z-index:150;width:min(640px,90vw);background:#fff;border-left:1px solid rgba(79,70,229,.15);box-shadow:-8px 0 40px rgba(79,70,229,.08);display:flex;flex-direction:column;overflow:hidden}
.atab{position:relative;padding:12px 20px;border:none;background:none;cursor:pointer;font-family:var(--fd);font-weight:600;font-size:13px;border-bottom:2px solid transparent;transition:all .2s}
.atab.on{border-bottom-color:currentColor}
.rb{background:#fff;border:1px solid rgba(79,70,229,.08);margin-bottom:8px}
.rh{padding:12px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.rec.open .rb{display:block}
.rec:not(.open) .rb{display:none}
</style>
</head>
<body>
<script>
// ── CONSTANTS & DATA ───────────────────────────────────────────
const TODAY=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}),SDATA=[{id:1,name:'Alice',role:'Designer',status:'Active'},{id:2,name:'Bob',role:'Developer',status:'Active'},{id:3,name:'Carol',role:'PM',status:'Active'},{id:4,name:'Dave',role:'QA',status:'Active'}];let S={screen:'landing',view:'overview',team:[],idx:0,actions:[],decisions:[],timerSecs:0,timerOn:false,timerIv:null,banner:'',adminOpen:false,carryover:[]},tab='actions';
function lsg(k){try{return JSON.parse(localStorage.getItem(k))||[]}catch{return[]}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function el(t,a={},c=''){const e=document.createElement(t);if(a.cls)e.className=a.cls;if(a.css)Object.assign(e.style,a.css);if(a.id)e.id=a.id;if(typeof c==='string')e.textContent=c;else if(Array.isArray(c))c.forEach(ch=>e.appendChild(ch));else if(c)e.appendChild(c);return e}
function mono(t,s={}){return el('span',{css:{fontFamily:'var(--fm)',fontSize:'9px',textTransform:'uppercase',letterSpacing:'.15em',color:'var(--muted)',...s}},t)}
function fmt(s){const m=Math.floor(s/60),sec=s%60;return`${m}:${String(sec).padStart(2,'0')}`}
function svgi(d,w=20,h=20,s={}){const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('viewBox',`0 0 ${w} ${h}`);svg.setAttribute('width',w);svg.setAttribute('height',h);svg.style.stroke='currentColor';svg.style.strokeWidth='2';svg.style.fill='none';svg.style.strokeLinecap='round';svg.style.strokeLinejoin='round';Object.assign(svg.style,s);const path=document.createElementNS('http://www.w3.org/2000/svg','g');path.innerHTML=d;svg.appendChild(path);return svg}
function redraw(){document.body.replaceChildren(S.screen==='landing'?drawLanding():drawMain())}
function drawTopbar(){const tb=el('div',{cls:'topbar'});const logo=el('div',{css:{display:'flex',alignItems:'center',gap:'12px'}},el('div',{css:{width:'28px',height:'28px',background:'linear-gradient(135deg, #7C3AED, #4F46E5)',borderRadius:'4px',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'14px',fontWeight:'700'}},'⚡'),el('div',{},el('div',{css:{fontFamily:'var(--fd)',fontWeight:'700',fontSize:'13px',letterSpacing:'.05em'}},'DAILY STAND-UP'),el('div',{css:{fontSize:'9px',color:'var(--muted)',marginTop:'1px'}},'AI-Powered')));const badge=el('div',{css:{display:'inline-flex',alignItems:'center',gap:'5px',fontFamily:'var(--fm)',fontSize:'9px',textTransform:'uppercase',letterSpacing:'.1em',color:'var(--purple)',background:'rgba(124,58,237,.1)',border:'1px solid rgba(124,58,237,.2)',padding:'3px 8px'}},el('div',{css:{width:'4px',height:'4px',borderRadius:'50%',background:'var(--purple)',animation:'pulse 2s ease-in-out infinite'}}),'Claude');tb.appendChild(el('div',{css:{display:'flex',alignItems:'center',gap:'40px'}},logo,badge));if(S.view!=='overview')tb.appendChild(el('button',{css:{fontSize:'13px',fontWeight:'600',color:'var(--indigo)',cursor:'pointer'}},el('span',{},'← Back'),{onclick:()=>{stopTimer();S.view='overview';redraw()}}));return tb}
function drawLanding(){const ov=el('div',{css:{minHeight:'100vh',background:'var(--bg)'}});const l=el('div',{cls:'landing'});const lLeft=el('div',{cls:'l-left fi1'});const logo2=el('div',{css:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'32px'}},el('div',{css:{width:'40px',height:'40px',background:'linear-gradient(135deg, #7C3AED, #4F46E5)',borderRadius:'6px',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'18px',fontWeight:'700'}},'⚡'),el('div',{},el('div',{css:{fontFamily:'var(--fd)',fontWeight:'700',fontSize:'14px',letterSpacing:'.05em'}},'DAILY STAND-UP'),el('div',{css:{fontSize:'10px',color:'var(--muted)',marginTop:'2px'}},'AI-Powered')));const title=el('h1',{css:{fontSize:'54px',fontWeight:'800',lineHeight:'1.2',marginTop:'24px',letterSpacing:'-.02em'}},el('span',{css:{color:'var(--indigo)'}},"Today's"),el('div',{css:{fontSize:'48px',color:'var(--purple)',marginTop:'8px',fontStyle:'italic'}},'fifteen minutes,'),el('div',{css:{fontSize:'42px',color:'var(--fg)',marginTop:'4px'}},'with intent.'));const desc=el('p',{css:{color:'var(--muted)',lineHeight:'1.8',marginTop:'20px',maxWidth:'480px',fontSize:'15px'}},'Run focused stand-ups powered by Claude. Track actions, decisions, and outcomes in real-time.');const loadb=el('button',{cls:'btn-p',css:{marginTop:'32px',width:'fit-content'}},el('span',{},'Load Demo Data'));loadb.onclick=()=>doLoad(SDATA,'demo');const uploadBtn=el('button',{cls:'btn-g',css:{marginTop:'12px',width:'fit-content'}},el('span',{},'Or upload CSV'));lLeft.append(logo2,title,desc,loadb,uploadBtn);const lRight=el('div',{cls:'l-right fi2'});const features=[{icon:'⚡',title:'Live timer',desc:'15-minute stand-ups'},{icon:'💭',title:'AI summaries',desc:'Auto-track actions'},{icon:'📊',title:'History',desc:'All past meetings'}];features.forEach((f,i)=>{const card=el('div',{css:{padding:'20px',background:'#fff',borderRadius:'8px',border:'1px solid rgba(79,70,229,.1)',marginTop:i>0?'12px':'0'}},el('div',{css:{fontSize:'20px',marginBottom:'8px'}},f.icon),el('div',{css:{fontWeight:'600',fontSize:'13px',marginBottom:'4px'}},f.title),el('div',{css:{fontSize:'12px',color:'var(--muted)'}},f.desc));lRight.appendChild(card);});l.append(lLeft,lRight);ov.appendChild(l);return ov}
function drawOverview(){const ov=el('div',{cls:'mw'});const header=el('div',{css:{marginBottom:'40px'}},el('h2',{css:{fontSize:'28px',fontWeight:'700',marginBottom:'8px'}},'Stand-up Overview'),el('p',{css:{color:'var(--muted)',fontSize:'14px'}},'Start a new stand-up or review past meetings'));const cta=el('button',{cls:'btn-p',css:{marginBottom:'24px'}},el('span',{},'Start New Stand-up'));cta.onclick=startStandup;const actions=lsg('actions'),decisions=lsg('decisions'),carryover=lsg('carryover');const stats=el('div',{cls:'kpi-grid'});const items=[{label:'Actions',count:actions.length,color:'var(--indigo)'},{label:'Decisions',count:decisions.length,color:'var(--green-soft)'},{label:'Carryover',count:carryover.length,color:'var(--purple)'},{label:'Today',count:TODAY,color:'var(--red-soft)'}];items.forEach(item=>{stats.appendChild(el('div',{cls:'kpi'},el('div',{css:{fontSize:'11px',color:'var(--muted)',fontFamily:'var(--fm)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'8px'}},item.label),el('div',{css:{fontSize:'24px',fontWeight:'700',color:item.color}},typeof item.count==='number'?item.count:item.count)));});ov.append(cta,stats);return ov}
function drawStandup(){const container=el('div',{cls:'mw'});const member=S.team[S.idx];const header=el('div',{css:{marginBottom:'32px',display:'flex',alignItems:'center',justifyContent:'space-between'}},el('div',{},el('h2',{css:{fontSize:'28px',fontWeight:'700',marginBottom:'8px'}},member?member.name:'Stand-up'),el('div',{css:{color:'var(--muted)',fontSize:'13px'}},'Update',el('span',{css:{color:'var(--indigo)',fontWeight:'600'}},'  '+S.idx+' / '+S.team.length))),el('div',{css:{fontSize:'28px',fontWeight:'700',color:'var(--indigo)',fontFamily:'var(--fm)',letterSpacing:'.05em'}},el('span',{id:'stimer'},'0:00')));const form=el('div',{css:{background:'#fff',border:'1px solid rgba(79,70,229,.1)',padding:'32px',borderRadius:'8px'}});const label1=el('label',{css:{display:'block',marginBottom:'8px',fontWeight:'600',fontSize:'13px'}},'What did you accomplish?');const input1=el('textarea',{cls:'inp',css:{minHeight:'80px',marginBottom:'20px',resize:'none'}});const label2=el('label',{css:{display:'block',marginBottom:'8px',fontWeight:'600',fontSize:'13px'}},'Key decisions made:');const input2=el('textarea',{cls:'inp',css:{minHeight:'80px',marginBottom:'20px',resize:'none'}});const actions=el('div',{css:{marginBottom:'20px'}});const aTitle=el('div',{css:{fontWeight:'600',fontSize:'13px',marginBottom:'12px'}},'Actions:');const aList=el('div',{css:{display:'flex',flexDirection:'column',gap:'8px'}});S.actions.forEach(a=>{aList.appendChild(el('div',{css:{background:'#f0f4ff',padding:'8px 12px',fontSize:'12px',borderRadius:'4px'}},a.text));});actions.append(aTitle,aList);const decisions=el('div',{css:{marginBottom:'20px'}});const dTitle=el('div',{css:{fontWeight:'600',fontSize:'13px',marginBottom:'12px'}},'Decisions:');const dList=el('div',{css:{display:'flex',flexDirection:'column',gap:'8px'}});S.decisions.forEach(d=>{dList.appendChild(el('div',{css:{background:'#f0f4ff',padding:'8px 12px',fontSize:'12px',borderRadius:'4px'}},d.text));});decisions.append(dTitle,dList);const btnGroup=el('div',{css:{display:'flex',gap:'12px',marginTop:'24px'}});const nextBtn=el('button',{cls:'btn-p'},'Next');const finishBtn=el('button',{cls:'btn-ai'},'Finish & Save');nextBtn.onclick=()=>{S.actions.push({id:Date.now(),text:input1.value,owner:member.name,createdAt:Date.now()});if(input2.value)S.decisions.push({id:Date.now(),text:input2.value,meetingDate:TODAY,createdAt:Date.now()});if(S.idx<S.team.length-1)jumpTo(S.idx+1);else{S.view='summary';redraw()}};finishBtn.onclick=()=>{S.actions.push({id:Date.now(),text:input1.value,owner:member.name,createdAt:Date.now()});if(input2.value)S.decisions.push({id:Date.now(),text:input2.value,meetingDate:TODAY,createdAt:Date.now()});S.view='summary';redraw()};form.append(label1,input1,label2,input2,actions,decisions,el('div',{css:{marginTop:'24px',paddingTop:'24px',borderTop:'1px solid rgba(79,70,229,.1)'}},btnGroup));btnGroup.append(nextBtn,finishBtn);container.appendChild(header);container.appendChild(form);return container}
function drawSummary(){const container=el('div',{cls:'mw'});const header=el('div',{css:{marginBottom:'32px'}},el('h2',{css:{fontSize:'28px',fontWeight:'700',marginBottom:'8px'}},'Stand-up Summary'),el('p',{css:{color:'var(--muted)',fontSize:'14px'}},'Review and save your meeting'));const summary=el('div',{css:{background:'#fff',border:'1px solid rgba(79,70,229,.1)',padding:'32px',borderRadius:'8px',marginBottom:'24px'}});const actions=el('div',{css:{marginBottom:'24px'}},el('h3',{css:{fontWeight:'700',fontSize:'14px',marginBottom:'12px'}},'Actions ('+S.actions.length+')'));S.actions.forEach(a=>{actions.appendChild(el('div',{css:{background:'rgba(79,70,229,.05)',padding:'12px',marginBottom:'8px',fontSize:'13px',borderRadius:'4px'}},a.text));});const decisions=el('div',{css:{marginBottom:'24px'}},el('h3',{css:{fontWeight:'700',fontSize:'14px',marginBottom:'12px'}},'Decisions ('+S.decisions.length+')'));S.decisions.forEach(d=>{decisions.appendChild(el('div',{css:{background:'rgba(16,185,129,.05)',padding:'12px',marginBottom:'8px',fontSize:'13px',borderRadius:'4px'}},d.text));});const notes=el('textarea',{cls:'inp',css:{minHeight:'100px',marginTop:'20px',resize:'none'},placeholder:'Add any meeting notes...'});summary.append(actions,decisions,notes);const btnGroup=el('div',{css:{display:'flex',gap:'12px'}});const saveBtn=el('button',{cls:'btn-p'},'Save Meeting');const cancelBtn=el('button',{cls:'btn-g'},'Cancel');saveBtn.onclick=()=>finishUp(notes.value);cancelBtn.onclick=()=>{S.view='overview';redraw()};btnGroup.append(saveBtn,cancelBtn);container.append(header,summary,btnGroup);return container}
function doLoad(team,mode){const t=mode==='demo'?JSON.parse(JSON.stringify(SDATA)):team;Object.assign(S,{team:t,screen:'main',view:'overview',idx:0,actions:[],decisions:[],timerSecs:0,timerOn:false,banner:mode==='demo'?'Sample data loaded — upload CSV exports for live tickets':'Live data loaded successfully'});redraw();}
function startStandup(){Object.assign(S,{idx:0,timerSecs:0,actions:[],decisions:[],view:'standup'});redraw();startTimer();}
function jumpTo(idx){Object.assign(S,{idx,timerSecs:0,view:'standup'});redraw();startTimer();}
function finishUp(notes){const sa=lsg('actions');S.actions.forEach(a=>sa.push({...a,meetingDate:TODAY}));lss('actions',sa);const sd=lsg('decisions');S.decisions.forEach(d=>sd.push({...d,meetingDate:TODAY}));lss('decisions',sd);if(notes){const moms=lsg('mom');moms.push({id:Date.now(),meetingDate:TODAY,notes,actionCount:S.actions.length,decisionCount:S.decisions.length,savedAt:Date.now()});lss('mom',moms)}const nc=[...S.carryover,...S.actions.map(a=>({id:a.id,text:a.text,owner:a.owner,createdAt:a.createdAt}))];S.carryover=nc;lss('carryover',nc);stopTimer();Object.assign(S,{actions:[],decisions:[],timerSecs:0,banner:'Standup saved! Ready for tomorrow.',view:'overview'});redraw();}
function startTimer(){clearInterval(S.timerIv);S.timerOn=true;S.timerIv=setInterval(()=>{S.timerSecs++;const d=document.getElementById('stimer');if(d){d.textContent=fmt(S.timerSecs);d.style.color=S.timerSecs>180?'var(--red-soft)':'var(--fg)';d.style.animation=S.timerSecs>180?'pulse 2.5s ease-in-out infinite':'none'}},1000);}
function stopTimer(){clearInterval(S.timerIv);S.timerOn=false;}
function drawMain(){const w=el('div',{css:{minHeight:'100vh'}});w.appendChild(drawTopbar());if(S.view==='overview')w.appendChild(drawOverview());else if(S.view==='standup')w.appendChild(drawStandup());else if(S.view==='summary')w.appendChild(drawSummary());w.appendChild(el('div',{css:{textAlign:'center',padding:'20px 0',fontFamily:'var(--fm)',fontSize:'10px',textTransform:'uppercase',letterSpacing:'.25em',color:'var(--dim)'}},'AI features active · '+TODAY));return w;}
redraw();
</script>
</body>
</html>
