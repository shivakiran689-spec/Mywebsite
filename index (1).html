<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Stand-up · AI-Powered</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --indigo:#4F46E5;--green:#059669;--green-soft:#10B981;
  --red:#DC2626;--red-soft:#EF4444;--purple:#7C3AED;
  --bg:#F0F4FF;--fg:#0F172A;--muted:#64748B;--dim:#94A3B8;
  --card:#fff;--cb:rgba(79,70,229,0.1);--cs:0 1px 3px rgba(0,0,0,0.05),0 4px 16px rgba(79,70,229,0.06);
  --fd:'Syne',sans-serif;--fb:'Lora',serif;--fm:'Geist Mono',monospace;
}
html,body{background:var(--bg);color:var(--fg);min-height:100vh;font-family:var(--fd)}
body{background-image:radial-gradient(ellipse 100% 60% at 80% -10%,rgba(79,70,229,0.08),transparent 60%),radial-gradient(ellipse 70% 50% at 0% 100%,rgba(124,58,237,0.06),transparent 60%)}
button{cursor:pointer;font-family:var(--fd);background:none;border:none;color:inherit}
input,textarea{font-family:var(--fd)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(79,70,229,0.2);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes blink{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.fi1{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .00s both}
.fi2{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .07s both}
.fi3{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .14s both}
.fi4{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .21s both}
.fi5{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .28s both}
.landing{min-height:100vh;display:grid;grid-template-columns:1fr 460px}
.l-left{padding:56px 64px;display:flex;flex-direction:column;justify-content:space-between}
.l-right{background:linear-gradient(160deg,rgba(79,70,229,.03),rgba(124,58,237,.05));border-left:1px solid rgba(79,70,229,.1);padding:56px 44px;display:flex;flex-direction:column;justify-content:center;gap:24px}
.topbar{padding:14px 40px;border-bottom:1px solid rgba(79,70,229,.1);background:rgba(255,255,255,.9);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.mw{max-width:1280px;margin:0 auto;padding:40px}
.card{background:var(--card);border:1px solid var(--cb);box-shadow:var(--cs);transition:all .25s}
.card-h:hover{border-color:rgba(79,70,229,.3);box-shadow:0 4px 20px rgba(79,70,229,.12);transform:translateY(-1px);cursor:pointer}
.ai-panel{border:1.5px solid rgba(124,58,237,.25);background:linear-gradient(145deg,rgba(255,255,255,.98),rgba(245,243,255,.5));box-shadow:0 4px 24px rgba(124,58,237,.12);position:relative;overflow:hidden}
.ai-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#7C3AED,#4F46E5,#7C3AED);background-size:200% 100%;animation:shimmer 3s linear infinite}
.btn-p{background:linear-gradient(135deg,#4F46E5,#3730A3);color:#fff;font-weight:600;font-size:13px;padding:10px 20px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(79,70,229,.3);transition:all .25s}
.btn-p:hover{box-shadow:0 8px 28px rgba(79,70,229,.45);transform:translateY(-1px)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-g{background:rgba(79,70,229,.05);border:1px solid rgba(79,70,229,.15);color:var(--fg);font-size:13px;font-weight:500;padding:10px 18px;display:inline-flex;align-items:center;gap:8px;transition:all .2s;cursor:pointer}
.btn-g:hover{background:rgba(79,70,229,.1);border-color:rgba(79,70,229,.3);color:#4F46E5}
.btn-ai{background:linear-gradient(135deg,#7C3AED,#4F46E5);color:#fff;font-size:10px;font-weight:600;padding:7px 14px;display:inline-flex;align-items:center;gap:6px;box-shadow:0 2px 12px rgba(124,58,237,.35);cursor:pointer;transition:all .25s;text-transform:uppercase;letter-spacing:.05em;border:none}
.btn-ai:hover{box-shadow:0 6px 24px rgba(124,58,237,.5);transform:translateY(-1px)}
.btn-ai:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.inp{background:#F8FAFF;border:1px solid rgba(79,70,229,.15);color:var(--fg);padding:10px 12px;font-size:13px;outline:none;transition:all .2s;width:100%}
.inp:focus{border-color:rgba(79,70,229,.5);box-shadow:0 0 0 3px rgba(79,70,229,.08)}
.inp::placeholder{color:var(--dim)}
.dz{border:1.5px dashed rgba(79,70,229,.2);background:rgba(79,70,229,.02);padding:18px 20px;cursor:pointer;transition:all .2s}
.dz:hover,.dz.ov{border-color:rgba(79,70,229,.5);background:rgba(79,70,229,.04)}
.mono{font-family:var(--fm);font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--dim)}
.ai-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--purple);background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);padding:3px 8px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--purple);animation:pulse 2s ease-in-out infinite;display:inline-block}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--purple);display:inline-block}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(79,70,229,.15),transparent)}
.sg{display:grid;grid-template-columns:8fr 4fr;gap:40px}
.chat-box{height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:rgba(79,70,229,.02);border:1px solid rgba(79,70,229,.08);padding:12px;margin-bottom:10px}
.cb-u{background:linear-gradient(135deg,#4F46E5,#3730A3);color:#fff;padding:8px 12px;font-size:12px;line-height:1.6;max-width:88%;align-self:flex-end}
.cb-a{background:#fff;border:1px solid rgba(124,58,237,.25);color:var(--fg);padding:8px 12px;font-size:12px;line-height:1.6;max-width:88%;align-self:flex-start;white-space:pre-wrap}
.pbadge{font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:.15em;padding:3px 8px;display:inline-flex;align-items:center}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(79,70,229,.08)}
.kpi{background:#fff;padding:28px 24px}
.admin-ov{position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.65);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center}
.admin-pn{position:fixed;top:0;right:0;bottom:0;z-index:150;width:min(640px,90vw);background:#fff;border-left:1px solid rgba(79,70,229,.15);box-shadow:-8px 0 40px rgba(79,70,229,.08);display:flex;flex-direction:column;overflow:hidden}
.atab{padding:13px 22px;font-family:var(--fm);font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--dim);border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:8px;cursor:pointer}
.atab.on{border-bottom-color:var(--indigo);color:var(--indigo)}
.rec{border:1px solid rgba(79,70,229,.1);margin-bottom:8px}
.rh{padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:rgba(79,70,229,.02)}
.rh:hover{background:rgba(79,70,229,.04)}
.rb{padding:13px 16px;border-top:1px solid rgba(79,70,229,.08);display:none}
.rb.open{display:block}
.pseg{height:3px;border-radius:2px;transition:all .4s}
</style>
</head>
<body>
<div id="root"></div>
<script>

// ── HELPERS ──────────────────────────────────────────────────
const TODAY=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
const PALETTE=['#D4A574','#7DAB8E','#B89DC9','#7FA3C7','#DEB169','#D87060','#8FB8A4','#C7A0B4'];
const SDATA=[
  {id:1,name:'Priya Sharma',role:'L2 Support Engineer',avatar:'PS',tone:'#D4A574',
    resolved:[{id:'INC0012845',title:'Email server slow response across O365 mailboxes',priority:'P2',closedAt:'Yesterday · 4:32 PM',root:'Throttling rule misconfigured'},{id:'INC0012851',title:'VPN connection timeout for remote users',priority:'P3',closedAt:'Yesterday · 2:15 PM',root:'IKEv2 cert renewal'}],
    pending:[{id:'INC0012901',title:'Database query timeout in Salesforce CRM',priority:'P1',age:2,state:'In Progress',blocker:null,sla:'breach in 4h'},{id:'REQ0008234',title:'New Adobe license for design team (12 seats)',priority:'P4',age:5,state:'Awaiting Approval',blocker:'Finance approval pending',sla:'on track'},{id:'CHG0004521',title:'Quarterly patch deployment to prod web tier',priority:'P2',age:1,state:'Scheduled',blocker:null,sla:'on track'}]},
  {id:2,name:'Marcus Chen',role:'L3 Infrastructure',avatar:'MC',tone:'#7DAB8E',
    resolved:[{id:'INC0012812',title:'Storage volume alerts on prod-db-04',priority:'P1',closedAt:'Yesterday · 6:48 PM',root:'Log retention misconfig'}],
    pending:[{id:'INC0012878',title:'Intermittent 502s from API gateway',priority:'P2',age:3,state:'Investigating',blocker:'Awaiting Cloudflare support reply',sla:'breach in 18h'},{id:'PRB0001245',title:'Recurring memory leak in payments-svc',priority:'P2',age:8,state:'Root Cause Analysis',blocker:null,sla:'no SLA'}]},
  {id:3,name:'Aisha Bello',role:'L2 Support Engineer',avatar:'AB',tone:'#B89DC9',
    resolved:[{id:'INC0012833',title:'Printer offline on 4th floor',priority:'P4',closedAt:'Yesterday · 11:20 AM',root:'Driver update'},{id:'INC0012840',title:'Slack notifications not arriving for 3 users',priority:'P3',closedAt:'Yesterday · 1:55 PM',root:'DND policy override'}],
    pending:[{id:'INC0012895',title:'Two-factor auth failing for contractors',priority:'P2',age:1,state:'In Progress',blocker:null,sla:'on track'}]},
  {id:4,name:'Rajesh Kumar',role:'Network Engineer',avatar:'RK',tone:'#7FA3C7',
    resolved:[],
    pending:[{id:'INC0012760',title:'Branch office WAN packet loss (Bangalore)',priority:'P1',age:6,state:'Vendor Engaged',blocker:'Awaiting ISP RCA',sla:'breached'},{id:'CHG0004510',title:'Firewall rule cleanup — Q2 audit',priority:'P3',age:4,state:'In Review',blocker:null,sla:'on track'}]},
];
function cfn(n){let h=0;for(let i=0;i<n.length;i++)h=((h<<5)-h)+n.charCodeAt(i);return PALETTE[Math.abs(h)%PALETTE.length]}
function ini(n){const p=n.trim().split(/\s+/);return p.length===1?p[0].slice(0,2).toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase()}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function pSt(p){if(p==='P1')return{bg:'rgba(216,112,96,0.15)',tx:'#E89788',bd:'rgba(216,112,96,0.3)'};if(p==='P2')return{bg:'rgba(222,177,105,0.15)',tx:'#E5C088',bd:'rgba(222,177,105,0.3)'};if(p==='P3')return{bg:'rgba(125,171,142,0.15)',tx:'#9BC4AB',bd:'rgba(125,171,142,0.3)'};return{bg:'rgba(107,114,128,0.08)',tx:'#6B7280',bd:'rgba(107,114,128,0.2)'};}
function sSt(s){if(!s)return{bg:'rgba(107,114,128,0.08)',tx:'#6B7280',dot:'#9CA3AF'};if(s.includes('breached'))return{bg:'rgba(220,38,38,0.1)',tx:'#DC2626',dot:'#EF4444'};if(s.includes('breach'))return{bg:'rgba(216,112,96,0.2)',tx:'#E89788',dot:'#E89788'};if(s.includes('on track'))return{bg:'rgba(125,171,142,0.15)',tx:'#9BC4AB',dot:'#7DAB8E'};return{bg:'rgba(107,114,128,0.08)',tx:'#6B7280',dot:'#9CA3AF'};}
function tots(team){return{pending:team.reduce((a,p)=>a+p.pending.length,0),resolved:team.reduce((a,p)=>a+p.resolved.length,0),blocked:team.reduce((a,p)=>a+p.pending.filter(t=>t.blocker).length,0),breaching:team.reduce((a,p)=>a+p.pending.filter(t=>t.sla&&t.sla.includes('breach')).length,0)};}
function genpq(person){const q=[];person.pending.forEach(t=>{if(t.blocker)q.push(`${t.id} blocked — "${t.blocker}". Who can help?`);if(t.age>=5)q.push(`${t.id} is ${t.age} days old. Escalate?`);if(t.sla?.includes('breach')&&!t.sla.includes('no'))q.push(`${t.id} SLA: ${t.sla}. Path to closure?`);if(t.priority==='P1'&&!t.blocker)q.push(`${t.id} is P1 — ETA?`);});person.resolved.forEach(t=>{if(['P1','P2'].includes(t.priority))q.push(`${t.id} resolved (${t.root}) — runbook updated?`)});if(!q.length)q.push('Any blockers, or capacity for new work?');return q.slice(0,3);}
function agelbl(ts){const d=Math.floor((Date.now()-ts)/86400000);if(d<=0)return'today';if(d===1)return'yesterday';if(d<7)return`${d} days ago`;return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function pcsv(txt){
  function parseRow(line){
    const fields=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){fields.push(cur.trim());cur='';}
      else cur+=c;
    }
    fields.push(cur.trim());
    return fields;
  }
  const l=txt.split(/\r?\n/);if(!l.length)return[];
  const hh=parseRow(l[0]).map(x=>x.replace(/^"|"$/g,'').trim());
  const r=[];
  for(let i=1;i<l.length;i++){
    if(!l[i].trim())continue;
    const v=parseRow(l[i]).map(x=>x.replace(/^"|"$/g,'').trim());
    const row={};hh.forEach((k,j)=>row[k]=v[j]||'');r.push(row);
  }
  return r;
}
function pick(row,...cc){const keys=Object.keys(row);for(const c of cc){const f=keys.find(k=>k.toLowerCase().trim()===c.toLowerCase());if(f&&row[f])return String(row[f]).trim()}return''}
function ppri(v){if(!v)return'P3';const s=String(v).toLowerCase();if(s.startsWith('1')||s.includes('critical'))return'P1';if(s.startsWith('2')||s.includes('high'))return'P2';if(s.startsWith('3')||s.includes('med'))return'P3';if(s.startsWith('4')||s.includes('low'))return'P4';return'P3'}
function agd(ds){if(!ds)return 0;const d=new Date(ds);if(isNaN(d))return 0;return Math.max(0,Math.floor((Date.now()-d)/86400000))}
function fmtcl(ds){if(!ds)return'Recently';const d=new Date(ds);if(isNaN(d))return ds;const now=new Date(),y=new Date(now-86400000),t=d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});if(d.toDateString()===now.toDateString())return`Today · ${t}`;if(d.toDateString()===y.toDateString())return`Yesterday · ${t}`;return d.toLocaleDateString([],{month:'short',day:'numeric'})+' · '+t}
function bldteam(pr,rr){const g={};pr.map(r=>({num:pick(r,'number','id','ticket','task'),title:pick(r,'short description','short_description','description','title','summary'),pri:ppri(pick(r,'priority','urgency')),state:pick(r,'state','status','incident state')||'Open',who:pick(r,'assigned to','assigned_to','assignee','owner','assigned'),created:pick(r,'opened','opened_at','sys_created_on','created')})).filter(t=>t.num&&t.who).forEach(t=>{if(!g[t.who])g[t.who]={resolved:[],pending:[]};g[t.who].pending.push({id:t.num,title:t.title||'(no description)',priority:t.pri,age:agd(t.created),state:t.state,blocker:null,sla:t.pri==='P1'?'check SLA':'no SLA'})});rr.map(r=>({num:pick(r,'number','id','ticket','task'),title:pick(r,'short description','short_description','description','title','summary'),pri:ppri(pick(r,'priority','urgency')),state:pick(r,'state','status','incident state')||'Resolved',who:pick(r,'assigned to','assigned_to','assignee','owner','assigned'),closed:pick(r,'closed','closed_at','resolved','resolved_at')})).filter(t=>t.num&&t.who).forEach(t=>{if(!g[t.who])g[t.who]={resolved:[],pending:[]};g[t.who].resolved.push({id:t.num,title:t.title||'(no description)',priority:t.pri,closedAt:fmtcl(t.closed),root:t.state})});return Object.keys(g).sort().map((name,i)=>({id:i+1,name,role:'Team member',avatar:ini(name),tone:cfn(name),resolved:g[name].resolved,pending:g[name].pending}));}
function lsg(k){try{return JSON.parse(localStorage.getItem('sd-'+k)||'[]')}catch{return[]}}
function lss(k,v){try{localStorage.setItem('sd-'+k,JSON.stringify(v))}catch{}}
async function claude(sys,msg){try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:[{role:'user',content:msg}]})});const d=await r.json();return d.content?.map(b=>b.text||'').join('')||'AI unavailable.';}catch{return'AI is unavailable.'}}

// ── DOM BUILDER ───────────────────────────────────────────────
const el=(tag,props,...kids)=>{
  const e=document.createElement(tag);
  if(props)for(const[k,v]of Object.entries(props)){
    if(k==='cls')e.className=v;
    else if(k==='css'&&typeof v==='object')Object.assign(e.style,v);
    else if(k[0]==='o'&&k[1]==='n')e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='disabled'){if(v)e.setAttribute('disabled','');}
    else e.setAttribute(k,v);
  }
  kids.flat(99).forEach(c=>{if(c==null||c===false||c===undefined)return;e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);});
  return e;
};
const svgi=(d,w,h,attr)=>{const s=document.createElementNS('http://www.w3.org/2000/svg','svg');s.setAttribute('width',w||16);s.setAttribute('height',h||16);s.setAttribute('viewBox','0 0 24 24');s.setAttribute('fill','none');s.setAttribute('stroke','currentColor');s.setAttribute('stroke-width','1.5');if(attr)for(const[k,v]of Object.entries(attr))s.setAttribute(k,v);s.innerHTML=d;return s;};
const zap=()=>el('div',{css:{width:'30px',height:'30px',background:'linear-gradient(135deg,#4F46E5,#7C3AED)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0',boxShadow:'0 4px 12px rgba(79,70,229,0.35)'}},svgi('<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',15,15));
const aib=()=>el('span',{cls:'ai-badge'},el('span',{cls:'ai-dot'}),' Claude');
const mono=(t,css={})=>el('span',{cls:'mono',css},t);
const tdots=()=>el('span',{css:{display:'inline-flex',alignItems:'center',gap:'4px'}},...[0,1,2].map(i=>el('span',{cls:'tdot',css:{animation:`blink 1.2s ease-in-out infinite`,animationDelay:`${i*0.2}s`}})));
const pbadge=(p)=>{const s=pSt(p);return el('span',{cls:'pbadge',css:{background:s.bg,color:s.tx,border:`1px solid ${s.bd}`,gap:'0'}},p)};
const slabadge=(sla)=>{const s=sSt(sla);return el('span',{cls:'pbadge',css:{background:s.bg,color:s.tx,gap:'5px'}},el('span',{css:{width:'5px',height:'5px',borderRadius:'50%',background:s.dot,display:'inline-block'}}),sla)};
const ava=(av,tone,sz=48)=>el('div',{css:{width:`${sz}px`,height:`${sz}px`,background:tone+'22',color:tone,border:`1px solid ${tone}44`,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'700',fontSize:`${sz>60?sz*.35:sz*.32}px`,flexShrink:'0',fontFamily:'var(--fd)'}},av);

// ── STATE ─────────────────────────────────────────────────────
const S={screen:'landing',view:'overview',team:[],banner:'',idx:0,actions:[],decisions:[],carryover:lsg('carryover'),timerSecs:0,timerOn:false,timerIv:null,adminOpen:false,pcsv:null,rcsv:null};
function redraw(){document.getElementById('root').replaceChildren(S.screen==='landing'?drawLanding():drawMain())}

// ── LANDING ───────────────────────────────────────────────────
function drawLanding(){
  const errEl=el('div',{css:{border:'1px solid rgba(220,38,38,0.2)',background:'rgba(220,38,38,0.06)',padding:'10px 14px',fontSize:'12px',color:'var(--red)',display:'none'}});
  function mkDZ(type,label,color,opt){
    const dz=el('div',{cls:'dz'},el('div',{css:{display:'flex',alignItems:'center',gap:'10px'}},svgi('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',16,16,{stroke:color}),el('span',{css:{fontSize:'13px',color:'var(--muted)'}},'Drop CSV or click to browse')));
    const fi=el('input',{type:'file',accept:'.csv',css:{display:'none'}});
    function loadf(file){const reader=new FileReader();reader.onload=ev=>{const rows=pcsv(ev.target.result);S[type+'csv']={name:file.name,rows};dz.style.border=`2px solid ${color}`;dz.style.background=color+'08';dz.replaceChildren(el('div',{},el('div',{css:{fontFamily:'var(--fm)',fontSize:'12px',marginBottom:'4px'}},file.name),mono(`${rows.length} rows loaded`,{color})));openBtn.disabled=false;};reader.readAsText(file);}
    dz.addEventListener('click',()=>fi.click());
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('ov')});

      else{const g={};data.forEach(i=>{const d=i.meetingDate||'Unassigned';if(!g[d])g[d]=[];g[d].push(i)});Object.entries(g).sort(([a],[b])=>b.localeCompare(a)).forEach(([date,items])=>{const rb=el('div',{cls:'rb'});const il=el('div',{css:{display:'flex',flexDirection:'column',gap:'6px'}});items.forEach(item=>{il.appendChild(tab==='actions'?el('div',{css:{background:'#F8FAFF',border:'1px solid rgba(79,70,229,0.08)',padding:'10px 14px'}},el('div',{css:{fontSize:'13px',lineHeight:'1.6',marginBottom:'4px'}},item.text),mono('Owner · '+item.owner)):el('div',{css:{display:'flex',alignItems:'flex-start',gap:'10px',background:'rgba(16,185,129,0.04)',border:'1px solid rgba(16,185,129,0.15)',padding:'8px 12px',fontSize:'13px'}},svgi('<polyline points="20 6 9 17 4 12"/>',10,10,{stroke:'#10B981'}),item.text))});rb.appendChild(il);const tc=tab==='actions'?'rgba(79,70,229,0.08)':'rgba(16,185,129,0.08)';const tx=tab==='actions'?'var(--indigo)':'var(--green-soft)';const rh=el('div',{cls:'rh'},el('div',{css:{display:'flex',alignItems:'center',gap:'10px'}},el('span',{css:{fontFamily:'var(--fd)',fontWeight:'600',fontSize:'14px'}},date),el('span',{css:{fontFamily:'var(--fm)',fontSize:'9px',textTransform:'uppercase',padding:'2px 8px',background:tc,color:tx}},`${items.length} ${tab==='actions'?'items':'decisions'}`)),svgi('<polyline points="6 9 12 15 18 9"/>',12,12,{stroke:'var(--muted)'}));rh.onclick=()=>{rb.classList.toggle('open');rh.querySelector('svg').style.transform=rb.classList.contains('open')?'rotate(180deg)':''};const rec=el('div',{cls:'rec'});rec.append(rh,rb);body.appendChild(rec);});}
    }
    tabs.forEach(t=>{const tbb=el('button',{cls:'atab'+(tab===t.k?' on':''),css:{color:tab===t.k?t.c:'var(--dim)',borderBottomColor:tab===t.k?t.c:'transparent'}},t.l,el('span',{css:{background:tab===t.k?t.c+'18':'rgba(107,114,128,0.1)',color:tab===t.k?t.c:'var(--dim)',padding:'1px 6px',fontSize:'9px'}},String(lsg(t.k).length)));tbb.onclick=()=>{tab=t.k;showPanel()};tb.appendChild(tbb);});
    pn.append(tb,body);renderBody();ov.appendChild(pn);
  }
  showLogin();return ov;
}

// ── MAIN RENDER ───────────────────────────────────────────────
function drawMain(){
  const w=el('div',{css:{minHeight:'100vh'}});
  w.appendChild(drawTopbar());
  if(S.view==='overview')w.appendChild(drawOverview());
  else if(S.view==='standup')w.appendChild(drawStandup());
  else if(S.view==='summary')w.appendChild(drawSummary());
  if(S.adminOpen)w.appendChild(drawAdmin());
  w.appendChild(el('div',{css:{textAlign:'center',padding:'20px 0',fontFamily:'var(--fm)',fontSize:'10px',textTransform:'uppercase',letterSpacing:'.25em',color:'var(--dim)'}},'AI features active · '+TODAY));
  return w;
}

// ── TIMER ─────────────────────────────────────────────────────
function startTimer(){clearInterval(S.timerIv);S.timerOn=true;S.timerIv=setInterval(()=>{S.timerSecs++;const d=document.getElementById('stimer');if(d){d.textContent=fmt(S.timerSecs);d.style.color=S.timerSecs>180?'var(--red-soft)':'var(--fg)';d.style.animation=S.timerSecs>180?'pulse 2.5s ease-in-out infinite':'none'}},1000);}
function stopTimer(){clearInterval(S.timerIv);S.timerOn=false;}

// ── ACTIONS ───────────────────────────────────────────────────
function doLoad(team,mode){const t=mode==='demo'?JSON.parse(JSON.stringify(SDATA)):team;Object.assign(S,{team:t,screen:'main',view:'overview',idx:0,actions:[],decisions:[],timerSecs:0,timerOn:false,banner:mode==='demo'?'Sample data loaded — upload CSV exports for live tickets':'Live data loaded successfully'});redraw();}
function startStandup(){Object.assign(S,{idx:0,timerSecs:0,actions:[],decisions:[],view:'standup'});redraw();startTimer();}
function jumpTo(idx){Object.assign(S,{idx,timerSecs:0,view:'standup'});redraw();startTimer();}
function resetApp(){stopTimer();Object.assign(S,{screen:'landing',team:[],idx:0,actions:[],decisions:[],timerSecs:0,banner:'',pcsv:null,rcsv:null});redraw();}
function finishUp(notes){
  const sa=lsg('actions');S.actions.forEach(a=>sa.push({...a,meetingDate:TODAY}));lss('actions',sa);
  const sd=lsg('decisions');S.decisions.forEach(d=>sd.push({...d,meetingDate:TODAY}));lss('decisions',sd);
  if(notes){const moms=lsg('mom');moms.push({id:Date.now(),meetingDate:TODAY,notes,actionCount:S.actions.length,decisionCount:S.decisions.length,savedAt:Date.now()});lss('mom',moms)}
  const nc=[...S.carryover,...S.actions.map(a=>({id:a.id,text:a.text,owner:a.owner,createdAt:a.createdAt}))];S.carryover=nc;lss('carryover',nc);
  stopTimer();Object.assign(S,{actions:[],decisions:[],timerSecs:0,banner:'Standup saved! Ready for tomorrow.',view:'overview'});redraw();
}

redraw();

</script>
